    <meta name="twitter:description" content="আপনার পছন্দের প্রোডাক্ট অর্ডার করুন - দ্রুত ডেলিভারি">
    <script>
      (function () {
        var path = window.location.pathname || "";
        if (path.indexOf("/lp/") !== 0) return;

        var slug = path.replace("/lp/", "").split("/")[0];
        if (!slug) return;

        var API_BASE = "https://hogejkqzynixmjwodkoi.supabase.co";
        var API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvZ2Vqa3F6eW5peG1qd29ka29pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MjA0MTMsImV4cCI6MjA4ODE5NjQxM30.5J8qF-MV0CZxlklFjUqcXisJwK4DGNlxWZ04U8E89GY";

        function normalizeUrl(url) {
          try {
            var parsed = new URL(url, window.location.origin);
            parsed.hash = "";
            return parsed.toString();
          } catch (e) {
            return String(url || "").split("#")[0] || String(url || "");
          }
        }

        function getExternalId() {
          var id = "";
          try { id = localStorage.getItem("_vid") || ""; } catch (e) {}
          if (!id) {
            id = "v_" + Date.now() + "_" + Math.random().toString(36).slice(2, 14);
            try { localStorage.setItem("_vid", id); } catch (e) {}
          }
          return id;
        }

        function ensureFbq() {
          if (typeof window.fbq === "function") return window.fbq;
          var fbq = function () {
            fbq.callMethod ? fbq.callMethod.apply(fbq, arguments) : fbq.queue.push(arguments);
          };
          if (!window._fbq) window._fbq = fbq;
          fbq.push = fbq;
          fbq.loaded = true;
          fbq.version = "2.0";
          fbq.queue = [];
          window.fbq = fbq;
          return fbq;
        }

        function ensureSdkTag() {
          if (document.querySelector('script[data-lp-meta-pixel-sdk="true"],script[src*="connect.facebook.net/en_US/fbevents.js"]')) return;
          document.write('<script src="https://connect.facebook.net/en_US/fbevents.js" data-lp-meta-pixel-sdk="true" crossorigin="anonymous"><\\/script>');
        }

        function trackPageView(pixelId, force) {
          if (!pixelId) return;
          window.__lpMetaPixelTrackedUrls = window.__lpMetaPixelTrackedUrls || {};
          window.__lpCurrentPixelId = pixelId;

          var url = normalizeUrl(window.location.href);
          var key = pixelId + ":" + url;
          if (!force && window.__lpMetaPixelTrackedUrls[key]) {
            window._lpPageViewEventId = window.__lpMetaPixelTrackedUrls[key];
            window.__lpPageViewTracked = true;
            console.info("[LP Pixel] PageView deduped", { pixelId: pixelId, eventId: window._lpPageViewEventId, url: url });
            return;
          }

          var eventId = "eid_" + Math.random().toString(36).slice(2, 11) + "_" + Date.now();
          window._lpPageViewEventId = eventId;
          ensureFbq()("init", pixelId, { external_id: getExternalId(), country: "bd" });
          try { window.fbq("set", "autoConfig", true, pixelId); } catch (e) {}
          window.fbq("track", "PageView", {}, { eventID: eventId });
          window.__lpMetaPixelTrackedUrls[key] = eventId;
          window.__lpPageViewTracked = true;
          console.info("[LP Pixel] PageView fired", { pixelId: pixelId, eventId: eventId, url: url, fbqType: typeof window.fbq, ready: !!(window.fbq && window.fbq.callMethod) });
        }

        function installLifecycle(pixelId) {
          if (window.__lpMetaPixelLifecycleInstalled) return;
          var fire = function () { trackPageView(pixelId, false); };
          if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", function () {
              console.info("[LP Pixel] DOMContentLoaded", { pixelId: pixelId, ready: !!(window.fbq && window.fbq.callMethod) });
              fire();
            }, { once: true });
          }
          window.addEventListener("load", function () {
            console.info("[LP Pixel] window.load", { pixelId: pixelId, ready: !!(window.fbq && window.fbq.callMethod) });
            fire();
          }, { once: true });
          window.addEventListener("pageshow", fire);
          window.addEventListener("popstate", fire);
          window.addEventListener("hashchange", fire);

          ["pushState", "replaceState"].forEach(function (method) {
            var original = window.history[method];
            if (original && original.__lpWrapped) return;
            var wrapped = function () {
              var result = original.apply(this, arguments);
              setTimeout(function () {
                console.info("[LP Pixel] route change", { method: method, url: window.location.href });
                fire();
              }, 0);
              return result;
            };
            wrapped.__lpWrapped = true;
            window.history[method] = wrapped;
          });

          window.__lpMetaPixelLifecycleInstalled = true;
        }

        try {
          ensureFbq();
          var xhr = new XMLHttpRequest();
          xhr.open("GET", API_BASE + "/rest/v1/landing_pages?select=fb_pixel_id&slug=eq." + encodeURIComponent(slug) + "&is_active=eq.true&limit=1", false);
          xhr.setRequestHeader("apikey", API_KEY);
          xhr.setRequestHeader("Authorization", "Bearer " + API_KEY);
          xhr.setRequestHeader("Accept", "application/json");
          xhr.send(null);

          if (xhr.status >= 200 && xhr.status < 300) {
            var rows = JSON.parse(xhr.responseText || "[]");
            var pixelId = rows && rows[0] && rows[0].fb_pixel_id ? String(rows[0].fb_pixel_id) : "";
            if (!pixelId) {
              console.warn("[LP Pixel] No pixel ID found for slug", slug);
              return;
            }

            console.info("[LP Pixel] Head bootstrap fetched pixel", { slug: slug, pixelId: pixelId, path: path });
            ensureSdkTag();
            installLifecycle(pixelId);
            trackPageView(pixelId, true);
          } else {
            console.warn("[LP Pixel] Pixel lookup failed", { slug: slug, status: xhr.status });
          }
        } catch (error) {
          console.warn("[LP Pixel] Head bootstrap failed", error);
        }
      })();
    </script>
